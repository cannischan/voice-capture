<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Voice">
<title>Voice Capture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 400px;
    padding: 20px;
  }

  /* Record button */
  .record-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: none;
    background: #2563eb;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .record-btn:active {
    transform: scale(0.95);
  }

  .record-btn.recording {
    background: #dc2626;
    animation: pulse 2s ease-in-out infinite;
  }

  .record-btn.processing {
    background: #4b5563;
    cursor: wait;
  }

  .record-btn .icon {
    width: 36px;
    height: 36px;
    background: white;
    border-radius: 50%;
    transition: all 0.2s ease;
  }

  .record-btn.recording .icon {
    border-radius: 6px;
    width: 32px;
    height: 32px;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
    50% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
  }

  /* Spinner */
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .record-btn.processing .icon { display: none; }
  .record-btn.processing .spinner { display: block; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Status text */
  .status {
    font-size: 15px;
    color: #9ca3af;
    height: 24px;
    text-align: center;
  }

  .status.recording {
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: 28px;
    color: #dc2626;
  }

  .status.error {
    color: #f87171;
    font-size: 13px;
    max-width: 300px;
  }

  /* Path reminder banner */
  .path-banner {
    display: none;
    background: #1a1a2e;
    border: 1px solid #2563eb33;
    border-radius: 10px;
    padding: 10px 14px;
    width: 100%;
    max-width: 340px;
    text-align: center;
  }

  .path-banner.show { display: block; }

  .path-banner .path-label {
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 4px;
  }

  .path-banner .path-text {
    font-size: 13px;
    color: #93c5fd;
    word-break: break-all;
    margin-bottom: 8px;
  }

  .path-banner .copy-path-btn {
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Settings */
  .settings-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    display: flex;
    justify-content: flex-end;
    z-index: 10;
  }

  .settings-btn {
    background: none;
    border: none;
    color: #6b7280;
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
    -webkit-tap-highlight-color: transparent;
  }

  /* Settings modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }

  .modal h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #f5f5f5;
  }

  .modal label {
    font-size: 13px;
    color: #9ca3af;
    display: block;
    margin-bottom: 6px;
  }

  .modal input {
    width: 100%;
    padding: 10px 12px;
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e5e5e5;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
  }

  .modal input:focus {
    border-color: #2563eb;
  }

  .modal .btn-row {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .modal button {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .modal .btn-cancel {
    background: #333;
    color: #e5e5e5;
  }

  .modal .btn-save {
    background: #2563eb;
    color: white;
  }

  /* Recent notes */
  .recent {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 35vh;
    overflow-y: auto;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }

  .recent h3 {
    font-size: 13px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .note-item {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .note-item .note-date {
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 4px;
  }

  .note-item .note-preview {
    font-size: 14px;
    color: #d1d5db;
    line-limit: 2;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Safe area for iOS */
  @supports (padding-top: env(safe-area-inset-top)) {
    .settings-bar { padding-top: calc(env(safe-area-inset-top) + 8px); }
    .recent { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }
  }
</style>
</head>
<body>

<div class="settings-bar">
  <button class="settings-btn" onclick="openSettings()" aria-label="Settings">⚙</button>
</div>

<div class="container">
  <button class="record-btn" id="recordBtn" onclick="handleTap()">
    <div class="icon"></div>
    <div class="spinner"></div>
  </button>
  <div class="status" id="status">Tap to record</div>
  <div class="path-banner" id="pathBanner">
    <div class="path-label">Save to:</div>
    <div class="path-text" id="pathText"></div>
    <button class="copy-path-btn" onclick="copyPath()">Copy Path</button>
  </div>
</div>

<div class="recent" id="recentSection" style="display:none">
  <h3>Recent</h3>
  <div id="recentList"></div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <label for="apiKeyInput">OpenAI API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-proj-..." autocomplete="off">
    <label for="vaultPathInput">Obsidian Vault Path (reminder for saving)</label>
    <input type="text" id="vaultPathInput" placeholder="e.g. iCloud Drive/Obsidian/vault/voice-notes" autocomplete="off">
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
  // State
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let isProcessing = false;
  let startTime = null;
  let timerInterval = null;
  let notes = [];

  const btn = document.getElementById('recordBtn');
  const statusEl = document.getElementById('status');

  // Load saved notes and API key
  function getApiKey() {
    return localStorage.getItem('whisper_api_key') || '';
  }

  function loadNotes() {
    try {
      notes = JSON.parse(localStorage.getItem('voice_notes') || '[]');
      renderNotes();
    } catch(e) {
      notes = [];
    }
  }

  function saveNoteToHistory(date, preview) {
    notes.unshift({ date, preview: preview.substring(0, 150) });
    if (notes.length > 50) notes = notes.slice(0, 50);
    localStorage.setItem('voice_notes', JSON.stringify(notes));
    renderNotes();
  }

  function renderNotes() {
    const section = document.getElementById('recentSection');
    const list = document.getElementById('recentList');
    if (notes.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = notes.map(n => `
      <div class="note-item">
        <div class="note-date">${new Date(n.date).toLocaleDateString('en-US', {
          weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        })}</div>
        <div class="note-preview">${escapeHtml(n.preview)}</div>
      </div>
    `).join('');
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // Settings
  function getVaultPath() {
    return localStorage.getItem('vault_path') || '';
  }

  function openSettings() {
    document.getElementById('apiKeyInput').value = getApiKey();
    document.getElementById('vaultPathInput').value = getVaultPath();
    document.getElementById('settingsModal').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settingsModal').classList.remove('open');
  }

  function saveSettings() {
    const key = document.getElementById('apiKeyInput').value.trim();
    const vaultPath = document.getElementById('vaultPathInput').value.trim();
    localStorage.setItem('whisper_api_key', key);
    localStorage.setItem('vault_path', vaultPath);
    closeSettings();
    setStatus('Settings saved');
  }

  function showPathBanner() {
    const path = getVaultPath();
    if (!path) return;
    const banner = document.getElementById('pathBanner');
    document.getElementById('pathText').textContent = path;
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 8000);
  }

  function copyPath() {
    const path = getVaultPath();
    navigator.clipboard.writeText(path).then(() => {
      const btn = document.querySelector('.copy-path-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Path', 1500);
    });
  }

  // Timer
  function startTimer() {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const secs = String(elapsed % 60).padStart(2, '0');
      statusEl.textContent = `${mins}:${secs}`;
    }, 250);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function setStatus(text, type = '') {
    statusEl.textContent = text;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  // Main handler
  async function handleTap() {
    if (isProcessing) return;

    if (isRecording) {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    const apiKey = getApiKey();
    if (!apiKey) {
      openSettings();
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true }
      });

      // Determine supported mime type
      let mimeType = 'audio/mp4';
      if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'audio/webm;codecs=opus';
      }
      if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = ''; // let browser pick
      }

      const options = mimeType ? { mimeType } : {};
      mediaRecorder = new MediaRecorder(stream, options);
      audioChunks = [];

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        await processRecording();
      };

      mediaRecorder.start(1000); // collect in 1s chunks
      isRecording = true;
      btn.className = 'record-btn recording';
      statusEl.className = 'status recording';
      startTimer();
    } catch (err) {
      setStatus('Microphone access denied', 'error');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    isRecording = false;
    stopTimer();
    btn.className = 'record-btn processing';
    setStatus('Transcribing...');
    isProcessing = true;
  }

  async function processRecording() {
    try {
      // Determine file extension from mime type
      const mime = mediaRecorder.mimeType;
      let ext = 'm4a';
      if (mime.includes('webm')) ext = 'webm';
      else if (mime.includes('ogg')) ext = 'ogg';
      else if (mime.includes('mp4') || mime.includes('m4a')) ext = 'm4a';

      const blob = new Blob(audioChunks, { type: mime });
      const transcript = await transcribeWithWhisper(blob, ext);

      if (transcript) {
        const now = new Date();
        downloadMarkdown(transcript, now);
        saveNoteToHistory(now.toISOString(), transcript);
        setStatus('Saved!');
        showPathBanner();
      }
    } catch (err) {
      setStatus(err.message || 'Transcription failed', 'error');
    } finally {
      isProcessing = false;
      btn.className = 'record-btn';
      setTimeout(() => {
        if (!isRecording && !isProcessing) setStatus('Tap to record');
      }, 2000);
    }
  }

  async function transcribeWithWhisper(audioBlob, ext) {
    const apiKey = getApiKey();
    const formData = new FormData();
    formData.append('file', audioBlob, `recording.${ext}`);
    formData.append('model', 'whisper-1');
    formData.append('response_format', 'text');

    const response = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}` },
      body: formData
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`API error ${response.status}: ${errText}`);
    }

    return (await response.text()).trim();
  }

  function downloadMarkdown(transcript, date) {
    const pad = (n) => String(n).padStart(2, '0');
    const dateStamp = `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}`;
    const isoDate = `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;

    const markdown = `---
type: voice-note
date: ${isoDate}
---

${transcript}
`;

    const filename = `${dateStamp}_voice-note.md`;
    const blob = new Blob([markdown], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Init
  loadNotes();
</script>

</body>
</html>
